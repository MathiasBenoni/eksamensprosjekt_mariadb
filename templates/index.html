<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adjective Collector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>Adjective Collector</h1>
    <label class="theme-switch" aria-label="Toggle dark mode">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
        <span class="switch-label" id="switch-label">Dark mode</span>
    </label>
</header>

<main>
    <div class="card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <p class="flash {{ category }}">{{ message }}</p>
            {% endfor %}
        {% endwith %}

        <form method="post">
            <input type="text" name="word" placeholder="Enter an adjective" autofocus>
            <button type="submit">Add</button>
        </form>

        <div class="wordcloud-wrapper">
            <div class="wordcloud-area">
                <span class="wordcloud-hint">Wordcloud</span>
            </div>
            <div class="debug-overlay">
                {% for word, count in adjectives.items() %}
                    <div class="debug-row">
                        <span class="dw">{{ word }}</span>
                        <span class="dc">{{ count }}</span>
                    </div>
                {% else %}
                    <div class="debug-empty">No adjectives yet</div>
                {% endfor %}
            </div>
        </div>

    </div>
</main>

<script>
    const toggle = document.getElementById('theme-toggle');
    const label  = document.getElementById('switch-label');
    const root   = document.documentElement;

    applyTheme(localStorage.getItem('theme') || 'light');

    toggle.addEventListener('change', () => {
        const next = toggle.checked ? 'dark' : 'light';
        applyTheme(next);
        localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
        root.dataset.theme = theme;
        toggle.checked     = theme === 'dark';
        label.textContent  = theme === 'dark' ? 'Light mode' : 'Dark mode';
    }
</script>
</body>
</html>
