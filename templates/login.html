<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In – Adjective Collector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1><a href="{{ url_for('index') }}" class="site-title">Adjective Collector</a></h1>
    <label class="theme-switch" aria-label="Toggle dark mode">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
        <span class="switch-label" id="switch-label">Dark mode</span>
    </label>
</header>

<main>
    <div class="card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <p class="flash {{ category }}">{{ message }}</p>
            {% endfor %}
        {% endwith %}

        <h2>Log In</h2>

        <form method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Your username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Your password" required>

            <button type="submit">Log in</button>
        </form>

        <p>No account yet? <a href="{{ url_for('signup') }}">Sign up</a></p>

    </div>
</main>

<script>
    const toggle = document.getElementById('theme-toggle');
    const label  = document.getElementById('switch-label');
    const root   = document.documentElement;

    applyTheme(localStorage.getItem('theme') || 'light');

    toggle.addEventListener('change', () => {
        const next = toggle.checked ? 'dark' : 'light';
        applyTheme(next);
        localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
        root.dataset.theme = theme;
        toggle.checked     = theme === 'dark';
        label.textContent  = theme === 'dark' ? 'Light mode' : 'Dark mode';
    }
</script>
</body>
</html>
